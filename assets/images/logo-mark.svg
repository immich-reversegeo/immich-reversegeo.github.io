<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Logo mark — transparent background, pin symbol only.
    Circle head: 5 pie segments in official Immich brand colors.
    Segments (clockwise from top, 72° each):
      Red #FA2921 · Orange #FFB400 · Green #18C249 · Blue #1E83F7 · Pink #ED79B5
    Angles (standard SVG, y-down):
      -90° (top) → -18° → 54° → 126° → 198° → 270° (-90°)
    Endpoints on circle r=155, center (256,210):
      (256,55)  (403.4,162.1)  (347.1,335.4)  (164.9,335.4)  (108.6,162.1)
  -->
  <defs>
    <clipPath id="irg-head-m">
      <circle cx="256" cy="210" r="155"/>
    </clipPath>
  </defs>

  <!-- Pin tail (deep navy, sits behind the clipped circle head) -->
  <path d="M 200 355 L 312 355 L 256 465 Z" fill="#1E3A8A"/>

  <!-- 5 pie segments, clipped to the circular head -->
  <g clip-path="url(#irg-head-m)">
    <!-- Red: top to upper-right (-90° → -18°) -->
    <path d="M 256 210 L 256 55 A 155 155 0 0 1 403.4 162.1 Z" fill="#FA2921"/>
    <!-- Orange: upper-right to lower-right (-18° → 54°) -->
    <path d="M 256 210 L 403.4 162.1 A 155 155 0 0 1 347.1 335.4 Z" fill="#FFB400"/>
    <!-- Green: lower-right to lower-left (54° → 126°) -->
    <path d="M 256 210 L 347.1 335.4 A 155 155 0 0 1 164.9 335.4 Z" fill="#18C249"/>
    <!-- Blue: lower-left to upper-left (126° → 198°) -->
    <path d="M 256 210 L 164.9 335.4 A 155 155 0 0 1 108.6 162.1 Z" fill="#1E83F7"/>
    <!-- Pink: upper-left back to top (198° → 270°) -->
    <path d="M 256 210 L 108.6 162.1 A 155 155 0 0 1 256 55 Z" fill="#ED79B5"/>
  </g>

  <!-- Center: white ring → dark → blue location dot -->
  <circle cx="256" cy="210" r="62" fill="#FFFFFF"/>
  <circle cx="256" cy="210" r="32" fill="#1E293B"/>
  <circle cx="256" cy="210" r="16" fill="#1E83F7"/>
</svg>
